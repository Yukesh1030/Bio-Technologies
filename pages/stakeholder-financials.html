<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stakeholder Financials | STACKLY</title>
    <link rel="stylesheet" href="../css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 240px;
        }

        body {
            background-color: #050505;
        }

        /* Mobile-First Base Styles */
        .dashboard-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: var(--navbar-height);
        }

        .sidebar {
            width: 100%;
            height: 70px;
            position: fixed;
            bottom: 0;
            top: auto;
            left: 0;
            padding: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2001;
            overflow-y: hidden;
            border-radius: 20px 20px 0 0;
            transition: 0.3s ease;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            height: 100%;
            gap: 0;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.65rem;
            gap: 4px;
            flex: 1;
            text-align: center;
            white-space: nowrap;
            transition: 0.3s ease;
            text-decoration: none;
        }

        .menu-item svg { width: 20px; height: 20px; }
        .menu-item:hover, .menu-item.active { color: #fff; }
        .menu-item.active { background: transparent; color: var(--accent-color); }

        .main-content {
            flex: 1;
            padding: 20px;
            margin-bottom: 80px;
        }

        .dash-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
        }

        .dash-header h1 { font-size: 2rem; }

        .impact-chart-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 40px;
        }

        .chart-viz {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .bar {
            width: 60px;
            background: var(--accent-color);
            border-radius: 10px 10px 0 0;
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .bar::after {
            content: attr(data-year);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .bar:nth-child(even) {
            background: #00d2ff;
        }

        .finance-grid {
            display: grid;
            grid-template-columns: 1fr; /* 1 column mobile */
            gap: 25px;
        }

        .bar { 
            width: 30px; 
            background: var(--accent-color);
            border-radius: 10px 10px 0 0;
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        /* Desktop Adjustments */
        @media (min-width: 1025px) {
            .dashboard-wrapper { flex-direction: row; }
            .sidebar {
                width: var(--sidebar-width);
                height: calc(100vh - var(--navbar-height));
                position: fixed;
                top: var(--navbar-height);
                bottom: auto;
                background: rgba(255, 255, 255, 0.02);
                border-top: none;
                border-right: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 0;
                padding: 30px 20px;
                overflow-y: auto;
            }
            .sidebar-menu { flex-direction: column; gap: 10px; height: auto; }
            .menu-item {
                flex-direction: row;
                padding: 12px 16px;
                border-radius: 12px;
                font-size: 0.9rem;
                gap: 12px;
                justify-content: flex-start;
                text-align: left;
            }
            .menu-item.active { background: rgba(0, 116, 217, 0.1); border: 1px solid rgba(0, 116, 217, 0.2); }
            .main-content { margin-left: var(--sidebar-width); margin-bottom: 0; padding: 40px; }
            .dash-header { flex-direction: row; justify-content: space-between; align-items: center; }
            .dash-header h1 { font-size: 2.5rem; }
            .finance-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
            .bar { width: 60px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="../index.html">STACKLY</a></div>
        <ul class="nav-links">
            <li><a href="stakeholder-home.html">Home</a></li>
            <li><a href="stakeholder-financials.html" class="active">Financials</a></li>
            <li><a href="stakeholder-milestones.html">Milestones</a></li>
            <li><a href="support.html">Support</a></li>
            <li><a href="reagents.html">STACKLY Reagents</a></li>
            <li><a href="login.html" class="btn btn-primary" style="background-color: #ff4136">Logout</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="../index.html" class="menu-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Back to Home
                </a>
                <a href="stakeholder-home.html" class="menu-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Home
                </a>
                <a href="stakeholder-financials.html" class="menu-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Financials
                </a>
                <a href="stakeholder-milestones.html" class="menu-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    Milestones
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dash-header reveal">
                <div>
                    <p style="color: var(--accent-color); font-weight: 600; margin-bottom: 10px;">Investor Portal</p>
                    <h1>Financial Performance</h1>
                </div>
            </header>

            <section class="impact-chart-section reveal">
                <h2>Revenue Growth Velocity</h2>
                <div class="chart-viz">
                    <div class="bar" style="height: 30%;" data-year="2023"></div>
                    <div class="bar" style="height: 50%;" data-year="2024"></div>
                    <div class="bar" style="height: 75%;" data-year="2025"></div>
                    <div class="bar" style="height: 95%;" data-year="2026"></div>
                </div>
            </section>

            <div class="finance-grid">
                <div class="finance-card reveal" style="transition-delay: 0.2s;">
                    <span class="fin-label">Quarterly Revenue</span>
                    <div class="fin-value">$248.5M</div>
                </div>
                <div class="finance-card reveal" style="transition-delay: 0.3s;">
                    <span class="fin-label">Annual Growth</span>
                    <div class="fin-value">+32%</div>
                </div>
                <div class="finance-card reveal" style="transition-delay: 0.4s;">
                    <span class="fin-label">Net Margin</span>
                    <div class="fin-value">14.2%</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.reveal').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(25px)';
            el.style.transition = '1s cubic-bezier(0.16, 1, 0.3, 1)';
            observer.observe(el);
        });
    </script>
</body>
</html>
